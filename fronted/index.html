<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧通勤管理后台</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">SC</div>
        <div>
          <div class="brand-title">智慧通勤</div>
          <div class="brand-subtitle">管理后台 Web</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">运营模块</div>
        <nav class="nav-list" id="navList"></nav>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="topbar-kicker" id="moduleKicker">运营总览</div>
          <div class="topbar-title" id="moduleTitle">调度与运营工作台</div>
        </div>
        <div class="topbar-actions">
          <span class="topbar-pill">固定数据演示</span>
          <span class="topbar-pill">亮主题</span>
          <span class="topbar-pill">可交互</span>
        </div>
      </header>

      <section class="hero card">
        <div class="hero-copy">
          <div class="hero-badge" id="moduleBadge">运营中枢</div>
          <p class="hero-summary" id="moduleSummary">地图调度、候车热力图、订单、退款和共享电动车资格统一展示。</p>
          <div class="hero-actions" id="moduleActions"></div>
        </div>
        <div class="hero-metrics" id="moduleMetrics"></div>
      </section>

      <section class="workspace-grid">
        <section class="workspace card">
          <div class="panel-header">
            <div>
              <div class="panel-title" id="workspaceTitle">调度工作区</div>
              <div class="panel-subtitle" id="workspaceSubtitle">切换模块、线路和热度后，工作区内容会同步变化。</div>
            </div>
          </div>
          <div id="workspace"></div>
        </section>

        <aside class="rail">
          <section class="panel card">
            <div class="panel-header">
              <div>
                <div class="panel-title" id="cardsTitle">模块卡片</div>
                <div class="panel-subtitle" id="cardsSubtitle">当前模块的关键动作与状态。</div>
              </div>
            </div>
            <div id="moduleCards"></div>
          </section>

          <section class="panel card">
            <div class="panel-header">
              <div>
                <div class="panel-title">实时摘要</div>
                <div class="panel-subtitle">调度、审核和提醒的固定演示流。</div>
              </div>
            </div>
            <div class="feed-list" id="moduleFeed"></div>
          </section>

          <section class="panel card">
            <div class="panel-header">
              <div>
                <div class="panel-title" id="tableTitle">关键数据</div>
                <div class="panel-subtitle">当前模块的固定表格演示。</div>
              </div>
            </div>
            <div class="table-wrap" id="moduleTable"></div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
